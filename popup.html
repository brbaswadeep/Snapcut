<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SnapCut</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:270px;background:#09090f;color:#f0eee8;font-family:-apple-system,'Segoe UI',sans-serif;overflow:hidden}
header{padding:16px 18px 13px;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.05));border-bottom:1px solid rgba(255,255,255,.06)}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-name{font-weight:800;font-size:16px;letter-spacing:-.3px;background:linear-gradient(90deg,#fff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.body{padding:14px 18px 18px}
.cta{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,.45)}
.cta:active{transform:none}
.steps{margin-top:12px;display:flex;flex-direction:column;gap:5px}
.step{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04)}
.sn{width:17px;height:17px;border-radius:50%;background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#c4b5fd;flex-shrink:0}
.st{font-size:11px;color:rgba(255,255,255,.4);line-height:1.4}
.divider{height:1px;background:rgba(255,255,255,.05);margin:12px 0}
.pill{display:flex;align-items:center;gap:7px;padding:8px 11px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pill-text{font-size:11px;color:rgba(255,255,255,.45);line-height:1.4}
.pill-text strong{color:#86efac;font-weight:600}
footer{padding:7px 18px;border-top:1px solid rgba(255,255,255,.04);text-align:center;font-size:9.5px;color:rgba(255,255,255,.18)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">✂️</div>
    <div>
      <div class="logo-name">SnapCut</div>
      <div class="logo-sub">AI Background Remover</div>
    </div>
  </div>
</header>
<div class="body">
  <button class="cta" id="btn"><span style="font-size:17px">⬚</span> Select Area</button>
  <div class="steps">
    <div class="step"><div class="sn">1</div><div class="st">Click &amp; drag to select any area</div></div>
    <div class="step"><div class="sn">2</div><div class="st">Captured instantly as PNG</div></div>
    <div class="step"><div class="sn">3</div><div class="st">Background removed — download PNG</div></div>
  </div>
  <div class="divider"></div>
  <div class="pill">
    <div class="dot"></div>
    <div class="pill-text"><strong>Powered by remove.bg</strong> · High-quality API</div>
  </div>
</div>
<footer>Fast · Precise · Cloud-processed cutouts</footer>
<script src="popup.js"></script>
</body>
</html>
